<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14161a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ankiportable" />

  <title>Ankiportable — Free Online .apkg File Reader &amp; Offline Anki Flashcard Study App</title>
  <meta name="description" content="Free, offline, browser-based .apkg file reader and Anki flashcard study app. No install, no account, no sync — open Anki decks and study with spaced repetition on any device. Works on iPhone, Android, Windows, Mac, Linux." />
  <meta name="keywords" content="apkg reader, apkg file reader, open apkg online, anki apkg viewer, anki online, anki web app, anki flashcards, spaced repetition, offline flashcards, browser flashcards, study app, apkg to browser, anki pwa, free anki alternative, anki iphone free, anki without install" />
  <meta name="author" content="Ankiportable" />
  <link rel="canonical" href="https://another1nat.github.io/Ankiportable/" />

  <!-- Open Graph / social share -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Ankiportable" />
  <meta property="og:title" content="Ankiportable — Free Online .apkg Reader &amp; Anki Study App" />
  <meta property="og:description" content="Open any Anki .apkg file in your browser. No install, no account, works offline. Free flashcard study with spaced repetition on any device." />
  <meta property="og:url" content="https://another1nat.github.io/Ankiportable/" />
  <meta property="og:image" content="https://another1nat.github.io/Ankiportable/icon.svg" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Ankiportable — Free Online .apkg Reader" />
  <meta name="twitter:description" content="Open Anki .apkg files in your browser. Offline, no install, free." />
  <meta name="twitter:image" content="https://another1nat.github.io/Ankiportable/icon.svg" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <style id="card-css"></style>

  <!-- Structured data: helps Google understand what this page is -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Ankiportable",
    "description": "Free online .apkg file reader and offline Anki flashcard study app. Runs entirely in the browser with no install, no account, and no sync server. Supports SM-2 spaced repetition, images, audio, and Cloze cards.",
    "url": "https://another1nat.github.io/Ankiportable/",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any (browser-based)",
    "browserRequirements": "Requires JavaScript. Requires HTML5.",
    "isAccessibleForFree": true,
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "featureList": [
      "Opens .apkg files (collection.anki2, anki21, anki21b/zstd)",
      "Offline, installable PWA for iPhone and Android",
      "SM-2 spaced repetition scheduler",
      "Session scrubber slider to jump to any card",
      "Auto-resume interrupted study sessions",
      "Folders, color-coding, and manual reorder",
      "Export and restore progress as JSON",
      "Zero network requests at runtime"
    ]
  }
  </script>
</head>
<body>
  <header>
    <div class="header-left">
      <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar" title="Toggle sidebar">☰</button>
      <h1>Ankiportable</h1>
      <div id="global-stats"></div>
    </div>
    <div class="header-right">
      <label class="setting" title="Max new cards introduced per day. Leave blank = unlimited.">
        <span>New/day</span>
        <input id="setting-new-cap" type="number" min="0" placeholder="∞" />
      </label>
      <label class="setting" title="Auto-end session after N minutes. Leave blank = unlimited.">
        <span>Session</span>
        <input id="setting-session-min" type="number" min="0" placeholder="∞" />
        <span class="unit">min</span>
      </label>
      <div class="volume-control" title="Audio volume">
        <button id="volume-icon" class="icon-btn" aria-label="Toggle mute">🔊</button>
        <input id="volume-slider" type="range" min="0" max="100" value="100" />
      </div>
    </div>
  </header>

  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-section">
        <input id="deck-search" class="deck-search" type="search" placeholder="Search decks…" />
      </div>

      <div class="sidebar-section">
        <div class="sidebar-heading">
          <span>Folders</span>
          <button id="new-folder-btn" class="ghost-btn" title="Create folder">＋</button>
        </div>
        <div id="folder-list" class="folder-list"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-heading"><span>Filter by color</span></div>
        <div id="color-filter" class="color-filter"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-heading"><span>Sort</span></div>
        <select id="sort-select" class="sort-select">
          <option value="manual">Manual (drag to reorder)</option>
          <option value="name">Name (A→Z)</option>
          <option value="dateAdded">Date added (newest)</option>
          <option value="cardCount">Card count (largest)</option>
          <option value="lastStudied">Last studied (recent)</option>
          <option value="due">Due count (most due)</option>
        </select>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-heading"><span>Audio</span></div>
        <label class="setting inline-setting">
          <span>Auto-play</span>
          <select id="audio-autoplay-select" class="mini-select">
            <option value="answer">Answer side only</option>
            <option value="both">Both sides</option>
            <option value="off">Off</option>
          </select>
        </label>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-heading"><span>Progress</span></div>
        <div class="sidebar-actions">
          <button id="export-progress-btn" title="Download a JSON backup of all per-card progress">Export progress</button>
          <button id="import-progress-btn" title="Restore progress from a JSON backup">Restore progress</button>
          <input id="import-progress-input" type="file" accept=".json" hidden />
        </div>
      </div>
    </aside>

    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <main>
      <!-- HOME -->
      <section id="home" class="screen active">
        <div class="home-toolbar">
          <button id="import-btn" class="primary">Import .apkg</button>
          <input id="import-input" type="file" accept=".apkg" multiple hidden />
          <span id="import-status"></span>
          <span id="active-filter-label" class="active-filter-label"></span>
        </div>
        <div id="deck-list" class="deck-list"></div>
      </section>

      <!-- STUDY -->
      <section id="study" class="screen">
        <div class="study-toolbar">
          <div class="left">
            <button id="study-back-btn" title="End session (Esc)">← End</button>
            <button id="undo-btn" class="icon-btn" aria-label="Undo last grade (Z)" title="Undo last grade (Z)" disabled>↶</button>
            <span id="progress-counter">0/0</span>
          </div>
          <div class="right">
            <button id="card-color-btn" class="icon-btn" aria-label="Color-code this card (C)" title="Color-code this card (C)">✎</button>
            <button id="replay-btn" class="icon-btn" aria-label="Replay audio (R)" title="Replay audio (R)">🔊</button>
            <span id="session-timer">0s</span>
            <span id="session-remaining" class="hidden"></span>
          </div>
        </div>

        <div class="session-scrubber">
          <input id="session-slider" type="range" min="1" max="1" value="1" step="1"
                 aria-label="Jump to card in this session" />
          <span id="session-slider-label" class="scrubber-label">1 / 1</span>
        </div>

        <div class="card-wrap">
          <div id="card-inner" class="card"></div>
        </div>

        <div id="flip-row" class="flip-row">
          <button id="flip-btn" class="primary">Show answer <small>(Space)</small></button>
        </div>

        <div id="grade-row" class="grade-row hidden">
          <button class="grade-btn again" data-grade="0">Again <small>1 · <span id="preview-again"></span></small></button>
          <button class="grade-btn hard" data-grade="1">Hard <small>2 · <span id="preview-hard"></span></small></button>
          <button class="grade-btn good" data-grade="2">Good <small>3 · <span id="preview-good"></span></small></button>
          <button class="grade-btn easy" data-grade="3">Easy <small>4 · <span id="preview-easy"></span></small></button>
        </div>

        <div class="keyboard-legend">
          <kbd>Space</kbd>/<kbd>Enter</kbd> flip &amp; Good ·
          <kbd>1</kbd> Again · <kbd>2</kbd> Hard · <kbd>3</kbd> Good · <kbd>4</kbd> Easy ·
          <kbd>R</kbd> replay · <kbd>C</kbd> color · <kbd>Z</kbd> undo · <kbd>Esc</kbd> end
          <br><span class="touch-only">Swipe up = flip · answer side: ← Again · → Good · ↓ Hard · ↑ Easy</span>
        </div>
      </section>
    </main>
  </div>

  <!-- Session summary toast -->
  <div id="session-toast" class="session-toast hidden">
    <div class="toast-content">
      <div id="toast-title">Session complete</div>
      <div id="toast-stats"></div>
    </div>
    <button id="toast-dismiss" class="toast-dismiss" aria-label="Dismiss">✕</button>
  </div>

  <!-- Reusable popovers -->
  <div id="popover" class="popover hidden"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden" aria-hidden="true">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loading-msg">Loading…</div>
    </div>
  </div>

  <!-- Vendor -->
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/fzstd.js"></script>
  <!-- Base64-inlined SQLite WASM binary — avoids fetch() so file:// works -->
  <script src="vendor/sql-wasm-inline.js"></script>
  <script src="vendor/sql-wasm.js"></script>

  <!-- App -->
  <script src="js/parser.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
